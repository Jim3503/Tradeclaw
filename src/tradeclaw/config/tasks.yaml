compile_report_task:
  description: >
    整合两大Agent的分析结果，生成完整的每日A股早报。

    日期：{date}

    你必须做到：
    1. 汇总热点叙事分析（来自 narrative_task 的输出）
    2. 整合技术分析观点（来自 technical_task 的输出）
    4. 给出综合投资建议

    报告需要结构清晰、数据详实、观点明确

    重要：必须使用前面三个任务的分析结果来整合！
  expected_output: >
    完整的每日A股早报，包含：
    - 今日市场概览
    - 热点板块分析（叙事Agent）
    - 技术面分析（技术Agent）
    - 综合建议和操作参考

    格式：Markdown
    输出文件：reports/daily_report_{date}.md
  agent: report_compiler
