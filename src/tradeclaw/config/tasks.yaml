# ========================================
# TradeClaw Tasks 配置
# 每日A股早报任务定义
# ========================================

# ========================================
# 1. 热点叙事分析任务
# ========================================

narrative_task:
  description: >
    任务：分析当日A股市场的热点板块

    【数据】（如果没有数据，请基于市场常识分析）
    - 你可以基于以下常见热点进行分析：
      * 半导体、AI算力、光伏、新能源车、医药、白酒等热门板块
      * 政策驱动：国产替代、新基建、消费补贴等
      * 事件驱动：苹果/英伟达发布会、行业展会等

    【分析要求】
    1. 列出当日可能的热点头板块（基于近期市场特征）
    2. 分析每个热点头板块的上涨逻辑
    3. 判断持续性（短期催化还是中长期逻辑）
    4. 提示潜在风险

    【输出格式】
    - 热点板块TOP5及上涨原因
    - 持续性判断
    - 风险提示
  expected_output: >
    热点板块分析报告：
    - 热点板块TOP5及涨跌幅（估计值）
    - 每个板块的上涨驱动逻辑
    - 持续性判断
    - 风险提示
  agent: narrative_agent

# ========================================
# 2. 技术分析任务 - 持仓分析
# ========================================
technical_task:
  description: >
    【重要】你必须使用 context（上一任务的输出数据）来分析持仓股票！

    【context数据说明】
    上一任务（data_fetch_task）已经通过工具获取了以下数据：
    1. 热点板块数据
    2. 大盘指数数据
    3. 持仓股票的60日K线数据（这是最重要的！）

    【你必须做的事情】
    1. 从 context 中提取持仓股票的60日K线数据
    2. 基于这些真实K线数据，计算技术指标：
       - 60日最高价、最低价
       - MA5、MA10、MA20、MA60 均线
       - 支撑位、阻力位
       - 成交量变化
    3. 对每只持仓股票给出详细的技术分析

    【持仓股票】
    1. 紫金矿业(601899): 100股，成本34.89元
    2. 中韩半导体ETF(513310): 6100份，成本1.20元

    【历史交易】
    - 沪电股份(002463): 已卖出，盈利+16.51%

    【输出要求】
    - 必须包含具体价位（支撑位、阻力位）
    - 必须给出操作建议（持有/加仓/减仓/卖出）
    - 必须复盘历史交易的买卖点

  expected_output: >
    持仓股票技术分析报告：
    - 紫金矿业(601899)分析：支撑位、阻力位、均线、趋势、操作建议
    - 中韩半导体ETF(513310)分析：支撑位、阻力位、均线、趋势、操作建议
    - 历史交易复盘：沪电股份买卖点分析
    - 综合操作建议
  agent: technical_agent

